name: Publish Blender Add-on

on:
  push:
    tags:
      - 'v*.*.*'
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit
          pre-commit run --all-files

      - name: Package Add-on
        run: |
          ZIP_NAME="rsdf_surface_exporter-${GITHUB_REF_NAME}.zip"
          zip -r $ZIP_NAME \
            blender_manifest.toml \
            __init__.py \
            data/ \
            geometry/ \
            operators/ \
            rsdf_io/ \
            ui/ \
            utils/
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          artifacts: ${{ env.ZIP_NAME }}
          name: RSDF Surface Exporter ${{ github.ref_name }}
          body: "Automated release of RSDF Surface Exporter version ${{ github.ref_name }}"
